name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Verify changelog matches version
        run: python scripts/verify_changelog.py

      - name: Run tests
        run: python -m pytest -q

  # Smoke-test PyPI packaging (sdist + wheel) on one platform.
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Verify changelog matches version
        run: python scripts/verify_changelog.py

      - name: Build sdist and wheel
        run: python -m build

      - name: Smoke-install wheel
        run: |
          python -m pip install dist/*.whl
          python -c "import acid2reaper; print('acid2reaper', acid2reaper.__version__)"
